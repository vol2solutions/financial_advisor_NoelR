<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Financial Consultation</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial; background: #f5f8ff; color: #1f2937; }

.header {
  padding: 40px 10%;
  background: #002f87;
  color: white;
}

.container {
  padding: 40px 10%;
}

.section {
  background: white;
  padding: 25px;
  margin-bottom: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
}

button {
  background: #002f87;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  width: 100%;
}

h2 { margin-bottom: 10px; color: #002f87; }
label { font-weight: bold; }

.result {
  margin-top: 20px;
  font-weight: bold;
  font-size: 1.2rem;
}
</style>
</head>

<body>

<div class="header">
  <h1>Free Financial Consultation</h1>
  <p>Complete this short assessment to help us understand your financial needs. One of our advisors will contact you.</p>
</div>

<div class="container">

<form id="quizForm">

<!-- ===== USER INFO ===== -->
<div class="section">
  <h2>Your Details</h2>

  <label>Name</label>
  <input type="text" id="name" required>

  <label>Email</label>
  <input type="email" id="email" required>

  <label>Phone</label>
  <input type="tel" id="phone" required>
</div>

<!-- ===== FINANCIAL SITUATION ===== -->
<div class="section">
  <h2>Financial Situation</h2>

  <label>Employment Status</label>
  <select id="employment">
    <option value="10">Full-time employed</option>
    <option value="7">Self-employed</option>
    <option value="4">Part-time</option>
    <option value="2">Unemployed</option>
  </select>

  <label>Do you save monthly?</label>
  <select id="savings">
    <option value="10">Yes, consistently</option>
    <option value="5">Sometimes</option>
    <option value="1">No</option>
  </select>
</div>

<!-- ===== INVESTMENT READINESS ===== -->
<div class="section">
  <h2>Investment Readiness</h2>

  <label>Risk Tolerance</label>
  <select id="risk">
    <option value="10">High (Growth focused)</option>
    <option value="7">Medium</option>
    <option value="4">Low</option>
  </select>

  <label>Do you currently invest?</label>
  <select id="invest">
    <option value="10">Yes</option>
    <option value="3">No</option>
  </select>
</div>

<!-- ===== INTENT ===== -->
<div class="section">
  <h2>Financial Goals</h2>

  <label>When do you need financial advice?</label>
  <select id="urgency">
    <option value="10">Immediately</option>
    <option value="7">Within 3 months</option>
    <option value="4">6–12 months</option>
    <option value="1">Just exploring</option>
  </select>

  <label>Main goal</label>
  <select id="goal">
    <option value="10">Wealth growth</option>
    <option value="7">Retirement planning</option>
    <option value="5">Insurance</option>
    <option value="3">General advice</option>
  </select>
</div>

<button type="submit">Submit Assessment</button>

<div class="result" id="result"></div>

</form>
</div>

<script>
document.getElementById("quizForm").addEventListener("submit", function(e) {
  e.preventDefault();

  // user info
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;

  // scoring
  let score =
    parseInt(document.getElementById("employment").value) +
    parseInt(document.getElementById("savings").value) +
    parseInt(document.getElementById("risk").value) +
    parseInt(document.getElementById("invest").value) +
    parseInt(document.getElementById("urgency").value) +
    parseInt(document.getElementById("goal").value);

  let status = "";

  if (score >= 70) status = "🔥 HOT LEAD";
  else if (score >= 40) status = "🟠 WARM LEAD";
  else status = "❄️ COLD LEAD";

  document.getElementById("result").innerHTML =
    `Score: ${score}/60<br>Status: ${status}`;

  // WhatsApp message
  const message =
`New Financial Lead:
Name: ${name}
Email: ${email}
Phone: ${phone}
Score: ${score}/60
Status: ${status}`;

  const phoneNumber = "277XXXXXXXXX";
  window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`);
});
</script>

</body>
</html>
