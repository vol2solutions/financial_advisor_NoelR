<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Assessment</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial; background: #f5f8ff; color: #1f2937; }

.header {
  padding: 40px 10%;
  background: #002f87;
  color: white;
}

.container { padding: 40px 10%; }

.section {
  background: white;
  padding: 25px;
  margin-bottom: 20px;
  border-radius: 10px;
}

h2 { color: #002f87; margin-bottom: 15px; }

label { font-weight: bold; display: block; margin-top: 10px; }

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
}

button {
  width: 100%;
  padding: 14px;
  background: #002f87;
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  font-size: 1.2rem;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <h1>Financial Assessment</h1>
  <p>Help us understand your financial position so we can prepare a tailored plan for you.</p>
</div>
  
<div style="padding: 20px 10%; background: #ffffff; border-bottom: 1px solid #e5e7eb;">
<a href="index.html" style="
  color: #002f87;
  text-decoration: none;
  font-weight: bold;
">
  ← Back to Home
</a>
  
</div>

<div class="container">

<form id="form">

<!-- ===== PERSONAL ===== -->
<div class="section">
  <h2>Personal & Household</h2>

  <label>Full Name</label>
  <input type="text" id="name" required>

  <label>Email</label>
  <input type="email" id="email" required>

  <label>Phone</label>
  <input type="tel" id="phone" required>

  <label>Number of dependents</label>
  <select id="dependents">
    <option value="10">0</option>
    <option value="8">1–2</option>
    <option value="5">3–4</option>
    <option value="2">5+</option>
  </select>
</div>

<!-- ===== INCOME ===== -->
<div class="section">
  <h2>Income & Household</h2>

  <label>Employment status</label>
  <select id="employment">
    <option value="10">Full-time employed</option>
    <option value="8">Self-employed</option>
    <option value="5">Part-time</option>
    <option value="2">Unemployed</option>
  </select>

  <label>Your monthly income range</label>
  <select id="income">
    <option value="2">Below R5,000</option>
    <option value="4">R5,000 – R15,000</option>
    <option value="6">R15,000 – R30,000</option>
    <option value="8">R30,000 – R60,000</option>
    <option value="10">R60,000+</option>
  </select>

  <label>Total household income</label>
  <select id="householdIncome">
    <option value="2">Below R10,000</option>
    <option value="4">R10,000 – R25,000</option>
    <option value="6">R25,000 – R50,000</option>
    <option value="8">R50,000 – R100,000</option>
    <option value="10">R100,000+</option>
  </select>
</div>

<!-- ===== ASSETS ===== -->
<div class="section">
  <h2>Investments & Assets</h2>

  <label>Do you currently invest?</label>
  <select id="investments">
    <option value="10">Yes – actively investing</option>
    <option value="6">Yes – but irregular</option>
    <option value="2">No investments</option>
  </select>

  <label>Types of investments (if any)</label>
  <select id="investmentType">
    <option value="10">Unit trusts / diversified portfolio</option>
    <option value="8">Retirement annuity / pension</option>
    <option value="6">Stocks / shares</option>
    <option value="4">Property</option>
    <option value="2">None</option>
  </select>

  <label>Do you have emergency savings?</label>
  <select id="savings">
    <option value="10">Yes (3–6 months covered)</option>
    <option value="6">Some savings</option>
    <option value="2">No savings</option>
  </select>
</div>

<!-- ===== DEBT ===== -->
<div class="section">
  <h2>Debt & Financial Pressure</h2>

  <label>Debt level</label>
  <select id="debt">
    <option value="10">No debt</option>
    <option value="7">Low manageable debt</option>
    <option value="4">Moderate debt</option>
    <option value="1">High debt pressure</option>
  </select>

  <label>Monthly financial stress level</label>
  <select id="stress">
    <option value="10">Low stress</option>
    <option value="6">Moderate stress</option>
    <option value="3">High stress</option>
  </select>
</div>

<!-- ===== GOALS ===== -->
<div class="section">
  <h2>Goals & Intent</h2>

  <label>Main financial goal</label>
  <select id="goal">
    <option value="10">Wealth building</option>
    <option value="8">Retirement planning</option>
    <option value="6">Insurance / protection</option>
    <option value="5">Debt management</option>
    <option value="3">General advice</option>
  </select>

  <label>How soon do you need advice?</label>
  <select id="urgency">
    <option value="10">Immediately</option>
    <option value="7">Within 1–3 months</option>
    <option value="5">3–6 months</option>
    <option value="2">Just exploring</option>
  </select>
</div>

<button type="submit">Submit Assessment</button>

<div class="result" id="result"></div>

</form>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  // ===== USER INFO =====
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;

  // ===== ANSWERS (TEXT) =====
  const dependents = document.getElementById("dependents").selectedOptions[0].text;
  const employment = document.getElementById("employment").selectedOptions[0].text;
  const income = document.getElementById("income").selectedOptions[0].text;
  const householdIncome = document.getElementById("householdIncome").selectedOptions[0].text;

  const investments = document.getElementById("investments").selectedOptions[0].text;
  const investmentType = document.getElementById("investmentType").selectedOptions[0].text;
  const savings = document.getElementById("savings").selectedOptions[0].text;

  const debt = document.getElementById("debt").selectedOptions[0].text;
  const stress = document.getElementById("stress").selectedOptions[0].text;

  const goal = document.getElementById("goal").selectedOptions[0].text;
  const urgency = document.getElementById("urgency").selectedOptions[0].text;

  // ===== SCORE =====
  let score =
    parseInt(document.getElementById("dependents").value) +
    parseInt(document.getElementById("employment").value) +
    parseInt(document.getElementById("income").value) +
    parseInt(document.getElementById("householdIncome").value) +
    parseInt(document.getElementById("investments").value) +
    parseInt(document.getElementById("investmentType").value) +
    parseInt(document.getElementById("savings").value) +
    parseInt(document.getElementById("debt").value) +
    parseInt(document.getElementById("stress").value) +
    parseInt(document.getElementById("goal").value) +
    parseInt(document.getElementById("urgency").value);

  let status = "";

  if (score >= 90) status = "🔥 HOT LEAD";
  else if (score >= 60) status = "🟠 WARM LEAD";
  else status = "❄️ COLD LEAD";

  // ===== WHATSAPP MESSAGE =====
  const message =
`🧾 NEW FINANCIAL LEAD

📊 SCORE: ${score}/110
STATUS: ${status}

👤 PERSONAL
Name: ${name}
Email: ${email}
Phone: ${phone}
Dependents: ${dependents}

💼 INCOME
Employment: ${employment}
Personal Income: ${income}
Household Income: ${householdIncome}

📈 INVESTMENTS
Current Investments: ${investments}
Investment Type: ${investmentType}
Savings: ${savings}

💳 DEBT & STRESS
Debt Level: ${debt}
Financial Stress: ${stress}

🎯 GOALS
Goal: ${goal}
Urgency: ${urgency}
`;

  const phoneNumber = "27798526921";

  window.open(
    `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`,
    "_blank"
  );
});
</script>

</body>
</html>
